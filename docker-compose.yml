version: '3.9'

services:
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4321:4321"
    command: sh -c "npm install && npm run dev"
    environment:
      - HOST=0.0.0.0
      - PORT=4321

  prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
